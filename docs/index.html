<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGAMI Social Innovation Lab (SSIL) | Coming Soon</title>
    <style>
        /* Base Reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #0b132b;
            color: #f4f6f9;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Typography */
        h1, h2, h3, h4 {
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .accent-color {
            color: #4cc9f0;
        }

        /* Hero Section */
        header {
            min-height: 80vh;
            display: block;
            position: relative;
            background: radial-gradient(circle at 80% 20%, rgba(76, 201, 240, 0.15), transparent 40%),
                        radial-gradient(circle at 20% 80%, rgba(114, 9, 183, 0.15), transparent 50%),
                        #0b132b;
            padding: 80px 24px;
            text-align: center;
        }

        .hero-container {
            max-width: 900px;
            margin: 0 auto;
            padding-top: 40px;
        }

        .logo-sub {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #4cc9f0;
            margin-bottom: 12px;
            display: block;
            font-weight: 600;
        }

        .logo-main {
            font-size: 48px;
            line-height: 1.2;
            margin-bottom: 24px;
            color: #ffffff;
        }

        .hero-tagline {
            font-size: 20px;
            max-width: 700px;
            margin: 0 auto 48px auto;
            color: #cbd5e1;
            font-weight: 400;
        }

        .status-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(76, 201, 240, 0.4);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            letter-spacing: 0.1em;
            margin-bottom: 40px;
            color: #4cc9f0;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 4px rgba(76, 201, 240, 0.2); }
            100% { box-shadow: 0 0 16px rgba(76, 201, 240, 0.5); }
        }

        /* Main Content Grid Layout */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px 100px 24px;
        }

        section {
            margin-bottom: 80px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px;
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 32px;
            border-left: 4px solid #4cc9f0;
            padding-left: 16px;
            color: #ffffff;
        }

        /* MVV Block */
        .mvv-container {
            display: block;
        }

        .mvv-item {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .mvv-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .mvv-label {
            font-size: 13px;
            text-transform: uppercase;
            color: #4cc9f0;
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }

        .mvv-title {
            font-size: 20px;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .mvv-text {
            color: #94a3b8;
            font-size: 15px;
        }

        /* Core Businesses */
        .business-list {
            display: block;
        }

        .business-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .business-num {
            font-size: 14px;
            color: #4cc9f0;
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }

        .business-name {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .business-desc {
            font-size: 14px;
            color: #94a3b8;
            text-align: justify;
        }

        /* Effectuation Principles */
        .principles-grid {
            display: block;
        }

        .principle-item {
            margin-bottom: 20px;
            padding-left: 20px;
            position: relative;
        }

        .principle-item::before {
            content: "•";
            color: #4cc9f0;
            position: absolute;
            left: 0;
            font-size: 20px;
            top: -2px;
        }

        .principle-name {
            font-weight: bold;
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .principle-desc {
            font-size: 14px;
            color: #94a3b8;
        }

        /* Contact / Footer Info */
        .footer-info {
            text-align: center;
            color: #64748b;
            font-size: 13px;
            margin-top: 60px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 40px;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            header { padding: 60px 16px; min-height: auto; }
            .logo-main { font-size: 32px; }
            .hero-tagline { font-size: 16px; }
            section { padding: 24px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="hero-container">
            <span class="logo-sub">SAGAMI Social Innovation Lab</span>
            <h1 class="logo-main">さがみソーシャルイノベーションラボ</h1>
            <div class="status-badge">COMING SOON — 2026 始動</div>
            <p class="hero-tagline">
                地域の固有資産と先端技術を融合し、<br>社会的価値と経済利益が循環する持続可能な未来を創る。
            </p>
        </div>
    </header>

    <main>
        <div class="footer-info">
            <p>&copy; 2026 SAGAMI Social Innovation Lab (SSIL). All Rights Reserved.</p>
            <p style="margin-top: 8px; font-size: 11px; color: #475569;">さがみソーシャルイノベーションラボ</p>
        </div>
    </main>

</body>
</html>
